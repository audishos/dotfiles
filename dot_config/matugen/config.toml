[config]

[templates.waybar]
input_path = '~/.config/matugen/colors.css'
output_path = '~/.config/waybar/colors.css'

[templates.mango]
input_path = '~/.config/matugen/mango_colors.conf'
output_path = '~/.config/mango/colors.conf'
post_hook = 'mmsg -d reload_config' 

[templates.mako]
input_path = '~/.config/matugen/mako_colors'
output_path = '~/.config/mako/colors'
post_hook = 'makoctl reload'
